<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Notes | Smart Note Taking</title>
    <meta name="description"
        content="A clean, minimalist AI-inspired notes application for capturing your thoughts instantly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header class="header">
            <h1 class="logo">AI<span>Notes</span></h1>
            <p class="subtitle">Capture your thoughts in the flow.</p>
        </header>

        <section class="input-section card">
            <div class="input-group">
                <textarea id="noteInput" placeholder="What's on your mind?..." rows="3"></textarea>
                <div class="input-footer">
                    <span id="charCount">0 characters</span>
                    <button id="saveBtn" class="btn btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        Save Note
                    </button>
                </div>
            </div>
        </section>

        <section class="notes-container">
            <div class="notes-header">
                <h2>Your Notes</h2>
                <div id="emptyState" class="empty-state">
                    <p>No notes yet. Start writing above!</p>
                </div>
            </div>
            <div id="notesList" class="notes-grid">
                <!-- Notes will be injected here -->
            </div>
        </section>
    </main>

    <footer class="app-footer">
        <p>&copy; 2026 AI Notes MVP. Built with simplicity.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="script.js"></script>
</body>
</html>
